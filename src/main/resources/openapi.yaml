openapi: 3.1.0

info:
  title: Minimal Password Manager API
  version: 1.0.0

tags:
  - name: Users
    description: User management
  - name: Vaults
    description: Vault management
  - name: Credentials
    description: Credential management

paths:

  /users:
    post:
      tags: [ Users ]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserDTO'
      responses:
        '201':
          description: Created

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Users ]
      summary: Get user by id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '404':
          description: User not found

  /users/{userId}/vaults:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Vaults ]
      summary: Get all vaults for a user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/VaultDTO'
        '404':
          description: User not found

    post:
      tags: [ Vaults ]
      summary: Create a vault for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultDTO'
      responses:
        '201':
          description: Created

  /users/{userId}/vaults/{vaultId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: vaultId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    put:
      tags: [ Vaults ]
      summary: Update a vault for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultDTO'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultDTO'
        '404':
          description: User or vault not found

  /vaults/{vaultId}/credentials:
    parameters:
      - name: vaultId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Credentials ]
      summary: Get all credentials in a vault
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CredentialDTO'

    post:
      tags: [ Credentials ]
      summary: Create a credential in a vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialDTO'
      responses:
        '201':
          description: Created

  /vaults/{vaultId}/credentials/{credentialId}:
    parameters:
      - name: vaultId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: credentialId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Credentials ]
      summary: Get a specific credential by id in a vault
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialDTO'
        '404':
          description: Vault or credential not found

    put: # NEUE PUT OPERATION ERGÄNZUNG
      tags: [ Credentials ]
      summary: Update (replace) a specific credential by id in a vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialDTO'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialDTO'
        '404':
          description: Vault or credential not found

    delete:
      tags: [ Credentials ]
      summary: Delete a specific credential by id in a vault
      responses:
        '204':
          description: No Content (Successfully deleted)
        '404':
          description: Vault or credential not found


components:
  schemas:

    UserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        masterEmail:
          type: string
        masterPassword:
          type: string
        failedLoginAttempts:
          type: integer
        lockedUntil:
          type: string
          format: date-time
      required:
        - masterEmail
        - masterPassword

    VaultDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        autoFill:
          type: boolean
        credentials:
          type: array
          items:
            $ref: '#/components/schemas/CredentialDTO'
      required:
        - title
        - autoFill

    CredentialDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        isPasswordSecure:
          type: boolean
        username:
          type: string
        password:
          type: string
        passwordCiphertext:
          type: string
        passwordIV:
          type: string
        note:
          type: string
      required:
        - title
        - username