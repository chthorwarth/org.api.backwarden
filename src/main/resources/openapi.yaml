openapi: 3.1.0

info:
  title: Minimal Password Manager API
  version: 1.0.0

tags:
  - name: Root
    description: API entry point / navigation
  - name: Users
    description: User management
  - name: Vaults
    description: Vault management
  - name: Credentials
    description: Credential management

paths:

  /api:
    get:
      tags: [ Root ]
      operationId: getApiRoot
      summary: API entry point providing HATEOAS navigation links
      description: >
        Entry-point der API. Liefert Link-Header und/oder JSON-Links
        zu den wichtigsten Navigationsressourcen.
      responses:
        '200':
          description: OK
          headers:
            Link:
              description: >
                RFC-8288 compatible hypermedia links.
                Expected rels:
                  - registerUser  → POST /users
                  - loginUser     → POST /token
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                properties:
                  _links:
                    type: object
                    properties:
                      registerUser:
                        type: string
                        format: uri
                      loginUser:
                        type: string
                        format: uri

  /users:
    post:
      tags: [ Users ]
      operationId: createUser
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegistrationDTO'
      responses:
        '201':
          description: Created

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Users ]
      operationId: getUserById
      summary: Get user by id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserDTO'
        '404':
          description: User not found

  /users/{userId}/vaults:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Vaults ]
      operationId: listUserVaults
      summary: Get all vaults for a user (Wrapped)
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultWrapperDTO'
        '404':
          description: User not found

    post:
      tags: [ Vaults ]
      operationId: createUserVault
      summary: Create a vault for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultCreationDTO'
      responses:
        '201':
          description: Created

  /users/{userId}/vaults/{vaultId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: vaultId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Vaults ]
      operationId: getUserVaultById
      summary: Get a specific vault for a user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultDTO'
        '404':
          description: User or vault not found

    put:
      tags: [ Vaults ]
      operationId: updateUserVault
      summary: Update a vault for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VaultUpdateDTO'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VaultDTO'
        '404':
          description: User or vault not found

    delete:
      tags: [ Vaults ]
      operationId: deleteUserVault
      summary: Delete a vault for a user
      responses:
        '204':
          description: Vault successfully deleted
        '404':
          description: User or vault not found

  /vaults/{vaultId}/credentials:
    parameters:
      - name: vaultId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Credentials ]
      operationId: listVaultCredentials
      summary: Get all credentials in a vault (Wrapped)
      description: >
        Returns all credentials stored in the specified vault.
        Optionally filters credentials by title using a case-insensitive
        partial match.
      parameters:
        - name: title
          in: query
          required: false
          description: >
            Filters credentials by title. Matches all credentials whose
            title contains the given value (case-insensitive).
          schema:
            type: string

        - name: page
          in: query
          required: false
          description: Page index (0-based)
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0

        - name: size
          in: query
          required: false
          description: Page size
          schema:
            type: integer
            format: int32
            default: 10
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialWrapperDTO'

    post:
      tags: [ Credentials ]
      operationId: createVaultCredential
      summary: Create a credential in a vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialCreationDTO'
      responses:
        '201':
          description: Created

  /vaults/{vaultId}/credentials/{credentialId}:
    parameters:
      - name: vaultId
        in: path
        required: true
        schema:
          type: integer
          format: int32
      - name: credentialId
        in: path
        required: true
        schema:
          type: integer
          format: int32

    get:
      tags: [ Credentials ]
      operationId: getVaultCredentialById
      summary: Get a specific credential by id in a vault
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialDTO'
        '404':
          description: Vault or credential not found

    put:
      tags: [ Credentials ]
      operationId: updateVaultCredential
      summary: Update (replace) a specific credential by id in a vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CredentialUpdateDTO'
      responses:
        '200':
          description: Updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CredentialDTO'
        '404':
          description: Vault or credential not found

    delete:
      tags: [ Credentials ]
      operationId: deleteVaultCredential
      summary: Delete a specific credential by id in a vault
      responses:
        '204':
          description: No Content (Successfully deleted)
        '404':
          description: Vault or credential not found

components:
  schemas:

    LoginRequest:
      type: object
      description: DTO used for user login
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          format: password
      required:
        - email
        - password
    UserDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        masterEmail:
          type: string
        failedLoginAttempts:
          type: integer
        lockedUntil:
          type: string
          format: date-time
      required:
        - masterEmail

    UserRegistrationDTO:
      type: object
      description: DTO used only when creating a new user
      properties:
        masterEmail:
          type: string
        masterPassword:
          type: string
      required:
        - masterEmail
        - masterPassword

    VaultDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        autoFill:
          type: boolean
        selfLink:
          type: string
          format: uri
          readOnly: true
      required:
        - title
        - autoFill

    VaultCreationDTO:
      type: object
      description: DTO used only when creating a new vault
      properties:
        title:
          type: string
        autoFill:
          type: boolean
      required:
        - title
        - autoFill

    VaultUpdateDTO:
      type: object
      description: DTO used only when updating a vault
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        autoFill:
          type: boolean
      required:
        - id
        - title
        - autoFill

    CredentialDTO:
      type: object
      properties:
        id:
          type: integer
          format: int64
        selfLink:
          type: string
          format: uri
          readOnly: true
        title:
          type: string
        username:
          type: string
        password:
          type: string
        note:
          type: string
      required:
        - title
        - username

    CredentialCreationDTO:
      type: object
      description: DTO used only when creating a new credential
      properties:
        title:
          type: string
        username:
          type: string
        password:
          type: string
        note:
          type: string
      required:
        - title
        - username
        - password

    CredentialUpdateDTO:
      type: object
      description: DTO used only when updating a credential
      properties:
        id:
          type: integer
          format: int64
        title:
          type: string
        username:
          type: string
        password:
          type: string
        note:
          type: string
      required:
        - id
        - title
        - username
        - password

    VaultWrapperDTO:
      type: object
      properties:
        selfLink:
          type: string
          format: uri
        vaultDTOS:
          type: array
          items:
            $ref: '#/components/schemas/VaultDTO'

    CredentialWrapperDTO:
      type: object
      properties:
        selfLink:
          type: string
          format: uri
        credentialDTOS:
          type: array
          items:
            $ref: '#/components/schemas/CredentialDTO'