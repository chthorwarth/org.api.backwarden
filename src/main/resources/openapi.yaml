openapi: 3.1.0

info:
  title: Minimal Password Manager API
  version: 1.0.0

tags:
  - name: Users
    description: User management
  - name: Vaults
    description: Vault management
  - name: Credentials
    description: Credential management

paths:

  /users:
    post:
      tags: [ Users ]
      summary: Create a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                masterEmail:
                  type: string
                masterPassword:
                  type: string
              required:
                - masterEmail
                - masterPassword
      responses:
        '201':
          description: Created

  /users/{userId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [ Users ]
      summary: Get user by id
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  masterEmail:
                    type: string
        '404':
          description: User not found

  /users/{userId}/vaults:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [ Vaults ]
      summary: Get all vaults for a user
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    autoFill:
                      type: boolean

    post:
      tags: [ Vaults ]
      summary: Create a new vault for a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                autoFill:
                  type: boolean
              required:
                - title
                - autoFill
      responses:
        '201':
          description: Created

  /users/{userId}/vaults/{vaultId}:
    parameters:
      - name: userId
        in: path
        required: true
        schema:
          type: integer

      - name: vaultId
        in: path
        required: true
        schema:
          type: integer

    put:
      tags: [ Vaults ]
      summary: Update an existing vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                autoFill:
                  type: boolean
              required:
                - title
                - autoFill
      responses:
        '200':
          description: Vault updated successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  title:
                    type: string
                  autoFill:
                    type: boolean
        '404':
          description: User or Vault not found

    delete:
      tags: [ Vaults ]
      summary: Delete a vault
      responses:
        '204':
          description: Vault deleted
        '404':
          description: User or Vault not found

  /vaults/{vaultId}/credentials:
    parameters:
      - name: vaultId
        in: path
        required: true
        schema:
          type: integer

    get:
      tags: [ Credentials ]
      summary: Get all credentials in a vault
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: integer
                    title:
                      type: string
                    username:
                      type: string
                    note:
                      type: string

    post:
      tags: [ Credentials ]
      summary: Create a credential in a vault
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title:
                  type: string
                username:
                  type: string
                password:
                  type: string
                note:
                  type: string
              required:
                - title
                - username
                - password
      responses:
        '201':
          description: Created